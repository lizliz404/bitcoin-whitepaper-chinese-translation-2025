        packages: { "[+]": ["noerrors"] },

        processEscapes: true
      },
      options: {

      },

      startup: { typeset: false }

  <script defer src="https://cdn.jsdelivr.net/npm/markdown-it-footnote@4.0.0/dist/markdown-it-footnote.min.js"></script>

  <style>
    :root {
      --bg: #e7e0d2;
      --bg-grid: rgba(128, 53, 20, 0.05);
      --paper: #faf6ee;
      --paper-soft: #f2ecdf;
      --ink: #241f18;
      --muted: #6f675a;
      --accent: #c86a22;
      --accent-dark: #8b4318;
      --line: #cabda5;
      --line-dark: #a08e73;
      --code-bg: #eee4d2;
      --shadow: rgba(36, 31, 24, 0.12);
      --mono: "JetBrains Mono", "SFMono-Regular", Consolas, "Liberation Mono", monospace;
      --body: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    * { box-sizing: border-box; }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      color: var(--ink);
      font-family: var(--body);
      background:
        radial-gradient(var(--bg-grid) 1px, transparent 1px),
        var(--bg);
      background-size: 24px 24px;
    }

    .shell {
      max-width: 940px;
      margin: 0 auto;
      padding: 30px 18px 56px;
    }

    .site-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 18px;
    }

    .brand {
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .coin {
      width: 42px;
      height: 42px;
      flex: 0 0 auto;
      filter: drop-shadow(0 4px 10px rgba(139, 67, 24, 0.22));
    }

    .brand-copy {
      min-width: 0;
    }

    .brand-title {
      margin: 0;
      font-size: 18px;
      line-height: 1.25;
      font-weight: 800;
      letter-spacing: 0.2px;
    }

    .brand-subtitle {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.4;
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .top-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--accent-dark);
      font-size: 13px;
      font-weight: 700;
      text-decoration: none;
      padding: 8px 10px;
      border: 1px solid rgba(139, 67, 24, 0.22);
      background: rgba(250, 246, 238, 0.72);
      backdrop-filter: blur(2px);
    }

    .top-link:hover {
      color: var(--accent);
      border-color: rgba(139, 67, 24, 0.45);
    }

    .doc {
      position: relative;
      background: var(--paper);
      border: 1px solid var(--line);
      border-top: 5px solid var(--accent);
      box-shadow: 0 18px 45px var(--shadow);
    }

    .doc-badge {
      position: absolute;
      top: 12px;
      left: 16px;
      z-index: 1;
      color: #9c9488;
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 1px;
      text-transform: uppercase;
      user-select: none;
      pointer-events: none;
    }

    .markdown-body {
      max-width: none;
      min-width: 0;
      position: relative;
      padding: 44px 56px 52px;
      color: var(--ink);
      background: transparent;
    }

    .markdown-body h1 {
      margin-top: 0;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--line);
      font-size: 31px;
      line-height: 1.35;
      color: #16120d;
      font-weight: 850;
    }

    .markdown-body h2 {
      margin-top: 42px;
      margin-bottom: 18px;
      padding-bottom: 9px;
      border-bottom: 1px solid var(--line);
      font-size: 22px;
      line-height: 1.45;
      color: #1c1712;
      font-weight: 780;
    }

    .markdown-body h2::before {
      content: "";
      display: inline-block;
      width: 8px;
      height: 8px;
      margin-right: 10px;
      background: var(--accent);
      transform: translateY(-2px);
    }

    .markdown-body h3 {
      margin-top: 30px;
      color: #2b241b;
      font-weight: 760;
    }

    .markdown-body p,
    .markdown-body li {
      color: var(--ink);
      line-height: 1.84;
      font-size: 16px;
    }

    .markdown-body a {
      color: var(--accent-dark);
      font-weight: 700;
      text-decoration: none;
      border-bottom: 1px solid rgba(139, 67, 24, 0.3);
    }

    .markdown-body a:hover {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }

    .markdown-body blockquote {
      margin: 1.2em 0;
      color: #4f473a;
      background: var(--paper-soft);
      border-left: 4px solid var(--accent);
      border-radius: 0;
    }

    .markdown-body hr {
      height: 1px;
      margin: 34px 0;
      background: transparent;
      border: 0;
      border-top: 1px dashed var(--line-dark);
    }

    .markdown-body table {
      display: block;
      width: 100%;
      overflow-x: auto;
      border-collapse: collapse;
    }

    .markdown-body table th,
    .markdown-body table td {
      white-space: nowrap;
    }

    .markdown-body img {
      display: block;
      max-width: 100%;
      margin: 28px auto;
      padding: 14px;
      background: #fbf5e8;
      border: 1px solid var(--line);
    }

    .markdown-body pre {
      padding: 16px;
      overflow: auto;
      background: var(--code-bg);
      border: 1px solid var(--line);
      border-radius: 2px;
    }

    .markdown-body code,
    .markdown-body pre,
    .markdown-body pre code {
      font-family: var(--mono);
    }

    .markdown-body code {
      background: var(--code-bg);
      border-radius: 2px;
    }

    .markdown-body pre code {
      background: transparent;
      white-space: pre;
    }

    .footnotes {
      margin-top: 52px;
      padding-top: 22px;
      border-top: 2px dashed var(--line);
      color: var(--muted);
      font-size: 14px;
    }

    .footnote-ref a {
      color: var(--accent-dark);
      border-bottom: 0;
      font-family: var(--mono);
      font-weight: 800;
      padding: 0 2px;
    }

    .footnotes ol {
      padding-left: 1.4em;
    }

    mjx-container[jax="SVG"][display="true"] {
      display: block;
      max-width: 100%;
      overflow-x: auto;
      overflow-y: hidden;
      padding: 10px 0;
    }

    .state {
      padding: 54px 24px;
      text-align: center;
      color: var(--muted);
      font-family: var(--mono);
      font-size: 14px;
    }

    .state strong {
      display: block;
      margin-bottom: 12px;
      color: var(--accent-dark);
      font-family: var(--body);
      font-size: 18px;
      font-weight: 800;
    }

    .state .cursor {
      animation: blink 1s step-end infinite;
    }

    .state-actions {
      margin-top: 18px;
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
      font-family: var(--body);
    }

    .state-actions a {
      display: inline-block;
      padding: 10px 14px;
      color: #fff;
      text-decoration: none;
      font-weight: 750;
      background: var(--accent);
      border: 1px solid var(--accent-dark);
    }

    .state-actions a.alt {
      color: var(--accent-dark);
      background: transparent;
    }

    @keyframes blink {
      50% { opacity: 0; }
    }

    @media (max-width: 760px) {
      body {
        background-size: 18px 18px;
      }

      .shell {
        padding: 18px 10px 36px;
      }

      .site-head {
        flex-direction: column;
        align-items: stretch;
      }

      .actions {
        justify-content: flex-start;
      }

      .doc-badge {
        display: none;
      }

      .markdown-body {
        padding: 28px 20px 34px;
      }

      .markdown-body h1 {
        font-size: 24px;
      }

      .markdown-body h2 {
        font-size: 19px;
      }

      .markdown-body p,
      .markdown-body li {
        font-size: 15px;
        line-height: 1.78;
      }
    }
  </style>
</head>

<body>
  <div class="shell">
    <header class="site-head">
      <div class="brand">
        <svg class="coin" viewBox="0 0 32 32" aria-hidden="true">
          <circle cx="16" cy="16" r="16" fill="#F7931A"></circle>
          <path d="M21.5 13.5c.5-3.3-2-4.6-5.4-5.4l1.1-4.4-2.7-.7-1.1 4.3c-.7-.2-1.4-.3-2.2-.5l1.1-4.4-2.7-.7-1.1 4.5c-.6-.1-1.1-.3-1.6-.4l-3.3-.8-.6 2.6s1.8.4 1.7.4c1 .2 1.1.8 1.1 1.3l-1.1 4.4c.1 0 .2.1.3.1l-.3-.1-1.6 6.3c-.1.3-.4.8-1.2.6.1 0-1.8-.4-1.8-.4l-1.2 2.8 3.1.8c.6.2 1.2.3 1.8.5l-1.1 4.5 2.7.7 1.1-4.4c.7.2 1.4.4 2.1.5l-1.1 4.5 2.7.7 1.1-4.6c3.9.7 6.8.4 8-3 1-2.4-.1-3.7-1.7-4.6 1.2-.3 2.1-1 2.3-2.6zm-4.3 6c-.7 2.8-5.3 1.3-6.8.9l1.2-4.9c1.5.4 6.4 1.1 5.6 4zm.6-5.3c-.6 2.5-4.4 1.2-5.7.9l1.1-4.4c1.2.3 5.3 1 4.6 3.5z" fill="#ffffff"></path>

    <main class="doc">
      <div class="doc-badge">GENESIS-BLOCK-ARCHIVE // DECLASSIFIED</div>

      <article id="content" class="markdown-body">
        <div class="state">
          <strong>[ SYNCING WITH BLOCKCHAIN ]</strong>
          DECRYPTING LOCAL ARCHIVE: zh.md <span class="cursor">█</span>
        </div>
      </article>
    </main>
  </div>

  <script>
    const CONFIG = {
      repo: "Lizevolving/bitcoin-whitepaper-chinese-translation-2025",
      branch: "main",
      entry: "zh.md",

      /**
       * 如果你的 markdown 里故意写了原生 HTML，再改成 true。
       * 对纯文档展示来说，false 更稳。
       */
      allowHtmlInMarkdown: false
    };

    const RAW_BASE = `https://raw.githubusercontent.com/${CONFIG.repo}/${CONFIG.branch}/`;
    const REPO_URL = `https://github.com/${CONFIG.repo}`;
    const RAW_DOC_URL = `${RAW_BASE}${CONFIG.entry}`;

    const DOC_SOURCES = [
      {
        url: CONFIG.entry,
        assetBase: new URL(".", location.href).href
      },
      {
        url: RAW_DOC_URL,
        assetBase: RAW_BASE
      }
    ];

    window.addEventListener("DOMContentLoaded", init);

    async function init() {
      const content = document.getElementById("content");

      try {
        assertDeps();
        const doc = await fetchMarkdown();
        const source = preprocessMarkdown(doc.text);
        content.innerHTML = renderMarkdown(source, doc.assetBase);
        await typesetMath(content);
      } catch (error) {
        console.error(error);
        content.innerHTML = `
          <div class="state">
            <strong>[ SIGNAL LOST ]</strong>
            未能读取 zh.md。请确认 <code>index.html</code> 与 <code>zh.md</code> 位于同一目录，
            或直接访问备用节点。
            <div class="state-actions">
              <a href="${RAW_DOC_URL}" target="_blank" rel="noopener noreferrer">打开 Raw zh.md</a>
              <a class="alt" href="${REPO_URL}" target="_blank" rel="noopener noreferrer">打开 GitHub Repo</a>
            </div>
          </div>
        `;
      }
    }

    function assertDeps() {
      if (!window.markdownit) {
        throw new Error("markdown-it failed to load.");
      }
      if (!window.markdownitFootnote) {
        throw new Error("markdown-it-footnote failed to load.");
      }
    }

    async function fetchMarkdown() {
      let lastError = null;

      for (const source of DOC_SOURCES) {
        try {
          const response = await fetch(source.url, { cache: "no-store" });
          if (!response.ok) {
            throw new Error(`${response.status} ${source.url}`);
          }

          const text = await response.text();
          return {
            text,
            assetBase: source.assetBase
          };
        } catch (error) {
          lastError = error;
        }
      }

      throw lastError || new Error("No markdown source available.");
    }

    function createRenderer() {
      const md = window.markdownit({
        html: CONFIG.allowHtmlInMarkdown,
        linkify: true,
        breaks: false,
        typographer: false
      }).use(window.markdownitFootnote);

      const defaultLinkOpen =
        md.renderer.rules.link_open ||
        function(tokens, idx, options, env, self) {
          return self.renderToken(tokens, idx, options);
        };

      md.renderer.rules.link_open = function(tokens, idx, options, env, self) {
        const token = tokens[idx];
        const href = token.attrGet("href") || "";

        if (/^https?:\/\//i.test(href)) {
          token.attrSet("target", "_blank");
          token.attrSet("rel", "noopener noreferrer");
        }

        return defaultLinkOpen(tokens, idx, options, env, self);
      };

      const defaultImage =
        md.renderer.rules.image ||
        function(tokens, idx, options, env, self) {
          return self.renderToken(tokens, idx, options);
        };

      md.renderer.rules.image = function(tokens, idx, options, env, self) {
        const token = tokens[idx];
        const src = token.attrGet("src");

        if (src && !/^(?:[a-z]+:|\/|#)/i.test(src)) {
          token.attrSet("src", new URL(src, env.assetBase).href);
        }

        token.attrSet("loading", "lazy");
        token.attrSet("decoding", "async");

        return defaultImage(tokens, idx, options, env, self);
      };

      return md;
    }

    function renderMarkdown(text, assetBase) {
      const md = createRenderer();
      return md.render(text, { assetBase });
    }

    function preprocessMarkdown(source) {
      let text = source || "";

      text = text
        .replace(/^\uFEFF/, "")
        .replace(/\r\n?/g, "\n")
        .replace(/\u00A0/g, " ")
        .trim();

      text = normalizeDisplayMath(text);

      return text;
    }

    function normalizeDisplayMath(source) {
      return source.replace(/\$\$([\s\S]*?)\$\$/g, (_, tex) => {
        const cleaned = tex.trim();
        return `\n\n$$\n${cleaned}\n$$\n\n`;
      });
    }

    async function typesetMath(container) {
      if (!window.MathJax || !window.MathJax.typesetPromise) return;
      await window.MathJax.startup.promise;
      await window.MathJax.typesetPromise([container]);
    }
  </script>
