<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- 纯手工绘制的纯净版 Bitcoin SVG Icon -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><circle cx='16' cy='16' r='16' fill='%23F7931A'/><path fill='%23FFF' d='M22.5 12.6c.3-2.2-1.4-3.4-3.8-4.2l.8-3.1-1.9-.5-.8 3c-.5-.1-1-.3-1.6-.4l.8-3-1.9-.5-.8 3.1c-.4-.1-.8-.2-1.3-.3l0 0-2.6-.6-.5 2s1.4.3 1.4.3c.8.2 1 .7.9 1.1l-1.3 5.4c-.1.2-.3.4-.7.3 0 0-1.4-.4-1.4-.4l-1 2.3 2.5.6c.5.1.9.2 1.4.4l-.8 3.3 1.9.5.8-3.2c.5.1 1 .3 1.5.4l-.8 3.2 1.9.5.8-3.3c3.2.6 5.6.3 6.4-2.4.6-2.2-.1-3.4-1.6-4.2 1.1-.3 2-1 2.2-2.3zm-3.8 5.4c-.5 2.1-4 1-5.1.7l.9-3.7c1.1.3 4.7.7 4.2 3zm.6-4.7c-.5 1.9-3.5.9-4.5.7l.8-3.3c1 .2 4.1.6 3.7 2.6z'/></svg>">
  <title>比特币白皮书：中英对照版 (2025)</title>
  
  <!-- 引入 marked.js 核心库，轻量且高效 -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <style>
    /* 【视觉风格：极简密码朋克 (Cypherpunk Minimalist)】 */
    :root {
      /* 字体：优先无衬线系统字体，代码块使用等宽 */
      --font-body: "Inter", -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      --font-mono: "JetBrains Mono", "Fira Code", "SFMono-Regular", Consolas, monospace;
      
      /* 色彩系统：克制、高对比、比特币橙点缀 */
      --color-bg: #F4F4F5;         /* 浅锌灰，比纯白更护眼 */
      --color-paper: #FFFFFF;      /* 纯白阅读区 */
      --color-text: #18181B;       /* 极深灰，锐利但不刺眼 */
      --color-text-muted: #71717A; /* 辅助文本 */
      --color-accent: #F7931A;     /* 比特币橙 (核心点缀) */
      --color-border: #E4E4E7;     /* 极浅灰边框 */
      
      --radius: 4px;               /* 锐利的微圆角 */
    }
    
    * { box-sizing: border-box; }

    body {
      font-family: var(--font-body);
      background-color: var(--color-bg);
      /* 极具科技感的微弱点阵背景 */
      background-image: radial-gradient(var(--color-border) 1px, transparent 1px);
      background-size: 20px 20px;
      margin: 0;
      padding: 4rem 1rem;
      color: var(--color-text);
      font-size: 16px;
      line-height: 1.8;
      -webkit-font-smoothing: antialiased;
    }
    
    .markdown-body {
      max-width: 820px; /* 适合白皮书的阅读宽度 */
      margin: 0 auto;
      padding: 4rem 5rem;
      background: var(--color-paper);
      border-radius: var(--radius);
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 
                  0 2px 4px -1px rgba(0, 0, 0, 0.03),
                  0 0 0 1px rgba(0,0,0,0.02); /* 增加极细的轮廓线 */
      /* 顶部加入标志性的比特币橙色带 */
      border-top: 4px solid var(--color-accent);
    }
    
    /* 基础排版 */
    .markdown-body p { margin: 0 0 1.5em 0; }
    .markdown-body img { max-width: 100%; height: auto; border-radius: var(--radius); }
    
    /* 标题系统：干净、硬朗 */
    .markdown-body h1, .markdown-body h2, .markdown-body h3 {
      color: #000;
      font-weight: 700;
      line-height: 1.3;
    }

    .markdown-body h1 { 
      font-size: 2.2rem; 
      margin-bottom: 2rem; 
      padding-bottom: 1rem;
      border-bottom: 2px solid var(--color-border);
    }

    /* 极客风 H2 标题前缀 */
    .markdown-body h2 { 
      font-size: 1.5rem; 
      margin: 3.5rem 0 1.5rem 0; 
      position: relative;
    }
    .markdown-body h2::before {
      content: "#";
      color: var(--color-accent);
      margin-right: 8px;
      font-family: var(--font-mono);
      font-weight: 400;
      opacity: 0.8;
    }
    
    .markdown-body h3 { font-size: 1.2rem; margin: 2rem 0 1rem 0; }
    
    /* 链接与重点标记 */
    .markdown-body a { 
      color: var(--color-accent); 
      text-decoration: none; 
      font-weight: 500;
      border-bottom: 1px solid transparent;
      transition: all 0.2s ease;
    }
    .markdown-body a:hover { 
      border-bottom: 1px solid var(--color-accent); 
    }
    .markdown-body strong { font-weight: 600; color: #000; }
    
    /* 引用块（重要内容与中英对照区分） */
    .markdown-body blockquote { 
      margin: 2em 0; 
      padding: 1rem 1.5rem; 
      color: var(--color-text-muted); 
      background: #FAFAFA; 
      border-left: 3px solid var(--color-accent); 
      border-radius: 0 var(--radius) var(--radius) 0;
    }
    
    /* 代码块与行内代码 */
    .markdown-body code {
      font-family: var(--font-mono);
      background: #F4F4F5;
      padding: 0.2em 0.4em;
      border-radius: 3px;
      font-size: 0.85em;
      color: #E63946;
    }
    .markdown-body pre {
      background: #18181B;
      color: #E4E4E7;
      padding: 1.5rem;
      border-radius: var(--radius);
      overflow-x: auto;
    }
    .markdown-body pre code {
      background: transparent;
      color: inherit;
      padding: 0;
    }

    /* 表格（白皮书里可能会有） */
    .markdown-body table { width: 100%; border-collapse: collapse; margin-bottom: 1.5em; }
    .markdown-body th, .markdown-body td { border: 1px solid var(--color-border); padding: 0.8em; text-align: left; }
    .markdown-body th { background: #FAFAFA; font-weight: 600; }
    
    /* 终端加载动画样式 */
    .terminal-loading { 
      font-family: var(--font-mono); 
      text-align: center; 
      color: var(--color-text-muted); 
      padding: 80px 0; 
      font-size: 0.9rem;
    }
    .terminal-loading .orange { color: var(--color-accent); font-weight: bold; }
    .blink { animation: blink 1s step-end infinite; }
    @keyframes blink { 50% { opacity: 0; } }
    
    /* 移动端适配 */
    @media (max-width: 768px) {
      body { padding: 1rem 0.5rem; }
      .markdown-body { padding: 2rem 1.5rem; }
      .markdown-body h1 { font-size: 1.75rem; }
      .markdown-body h2 { font-size: 1.3rem; }
    }
  </style>
</head>

<body>
  <div id="content" class="markdown-body">
    <!-- 极客风加载界面 -->
    <div class="terminal-loading">
      Initializing Node ...<br><br>
      Syncing block data : <span class="orange">zh.md</span> <span class="blink">_</span>
    </div>
  </div>

  <script>
    const contentDiv = document.getElementById('content');

    // 直接抓取根目录下的 zh.md (如果是 README.md 改这里即可)
    fetch('zh.md')
      .then(response => {
        if (!response.ok) throw new Error('File not found');
        return response.text();
      })
      .then(text => {
        // 使用 marked.js 将 Markdown 实时渲染为 HTML
        contentDiv.innerHTML = marked.parse(text);
      })
      .catch(error => {
        // 抓取失败时的优美降级，直接导向 GitHub 仓库
        contentDiv.innerHTML = `
          <div style="text-align:center; padding: 4rem 0; font-family: var(--font-body);">
            <svg style="width:64px; height:64px; margin-bottom:1rem;" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
              <circle cx="16" cy="16" r="16" fill="#E4E4E7"/>
              <path fill="#71717A" d="M16 8v10m0 4h.01" stroke="#71717A" stroke-width="3" stroke-linecap="round"/>
            </svg>
            <h2 style="margin:0 0 1rem 0; font-size:1.5rem; border:none;">节点未同步</h2>
            <p style="color: var(--color-text-muted); margin-bottom: 2rem; font-size: 1rem;">
              无法在本地加载 <code style="color:var(--color-text);">zh.md</code> 文档。<br>
              请确认您处于 Web 环境中，或直接前往 GitHub 查看。
            </p>
            <a href="https://github.com/Lizevolving/bitcoin-whitepaper-chinese-translation-2025" target="_blank"
               style="display: inline-block; padding: 12px 24px; background: var(--color-text); color: #fff; border-radius: 4px; text-decoration: none; font-weight: 500; transition: background 0.2s;">
               前往 GitHub 仓库阅读
            </a>
          </div>
        `;
        console.error('Fetch error:', error);
      });
  </script>
</body>
</html>
